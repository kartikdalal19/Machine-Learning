<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CardioRisk AI - Advanced Heart Health Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .logo i {
            font-size: 32px;
            color: white;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #64748b;
            font-size: 16px;
            font-weight: 400;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 32px;
        }

        .form-group {
            position: relative;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            display: block;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
            font-size: 14px;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
            font-family: inherit;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
        }

        .predict-btn {
            width: 100%;
            grid-column: 1 / -1;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .predict-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }

        .predict-btn:active {
            transform: translateY(-2px);
        }

        .predict-btn.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .predict-btn.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-left: -10px;
            margin-top: -10px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result {
            margin-top: 32px;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            font-weight: 600;
            font-size: 18px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s ease;
        }

        .result.show {
            opacity: 1;
            transform: scale(1);
        }

        .result.high {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
        }

        .result.low {
            background: linear-gradient(135deg, #10b981, #34d399);
            color: white;
        }

        .probability {
            font-size: 32px;
            font-weight: 700;
            margin-top: 8px;
            display: block;
        }

        .progress-ring {
            width: 120px;
            height: 120px;
            margin: 20px auto;
        }

        .progress-circle {
            transform: rotate(-90deg);
            display: block;
        }

        .progress-circle circle {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            stroke: #e5e7eb;
        }

        .progress-circle .progress {
            stroke: url(#gradient);
            stroke-dasharray: 251.2;
            stroke-dashoffset: 251.2;
            transition: stroke-dashoffset 1s ease-in-out;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .card {
                padding: 24px;
                margin: 10px;
            }
            
            h1 {
                font-size: 24px;
            }
        }

        .tooltip {
            position: absolute;
            background: #1f2937;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            white-space: nowrap;
            z-index: 10;
        }

        .form-group:hover .tooltip {
            opacity: 1;
        }
    </style>
</head>
<body>

    <script>
        // Particle animation
        function createParticles() {
            const particles = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {

                particle.style.cssText = `
                    position: absolute;
                    width: 4px;
                    height: 4px;
                    background: rgba(255,255,255,0.5);

                    top: ${Math.random() * 100}%;

                    animation-delay: ${Math.random() * 2}s;

                particles.appendChild(particle);

        }

                    totChol: +document.getElementById('totChol').value,
                    sysBP: +document.getElementById('sysBP').value,
                    diaBP: +document.getElementById('diaBP').value,
                    height: +document.getElementById('height').value,
                    weight: +document.getElementById('weight').value,
                    heartRate: +document.getElementById('heartRate').value,
                    glucose: +document.getElementById('glucose').value
                };

                const res = await fetch("/predict", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(data)
                });

                const resultData = await res.json();
                
                // Animate result
                setTimeout(() => {
                    result.innerHTML = `
                        <div class="progress-ring">
                            <svg width="120" height="120">
                                <defs>
                                    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                        <stop offset="0%" stop-color="#ff6b6b"></stop>
                                        <stop offset="100%" stop-color="#feca57"></stop>
                                    </linearGradient>
                                </defs>
                                <circle class="progress-circle" cx="60" cy="60" r="40"></circle>
                                <circle class="progress progress-circle" cx="60" cy="60" r="40" 
                                    style="stroke-dashoffset: ${251.2 - (resultData.probability / 100) * 251.2}"></circle>
                            </svg>
                            <div class="probability">${resultData.probability}%</div>
                        </div>
                        <div>${resultData.risk}</div>
                    `;
                    
                    result.className = `result show ${resultData.risk === 'High Risk' ? 'high' : 'low'}`;
                }, 1500);

            } catch (error) {
                result.innerHTML = 'Error calculating risk. Please try again.';
                result.className = 'result show high';
            } finally {
                btn.classList.remove('loading');
                btnText.textContent = 'Calculate Again';
            }
        };

        // Initialize
        createParticles();

        // Add tooltips
        document.querySelectorAll('.tooltip-icon').forEach(icon => {
            icon.addEventListener('mouseenter', function() {
                // Tooltip functionality can be enhanced here
            });
        });
    </script>
</body>
</html>
